
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanna's Story | The Stable Heirloom</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
 
body{
  background:#120a07;
  font-family:'Crimson Text',serif;
  color:#2b1e16;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 16px;
}
 
/* ── BOOK WRAPPER ── */
.book-wrap{
  width:100%;
  max-width:980px;
  position:relative;
}
 
/* The open book */
.book{
  width:100%;
  aspect-ratio:1.55/1;
  min-height:520px;
  display:flex;
  position:relative;
  border-radius:4px 12px 12px 4px;
  box-shadow:0 30px 80px rgba(0,0,0,0.95),0 8px 24px rgba(0,0,0,0.7);
  overflow:hidden;
}
 
/* Left & right page panels */
.page{
  flex:1;
  background:#eaddca;
  background-image:url('https://www.transparenttextures.com/patterns/parchment.png');
  padding:38px 46px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  overflow:hidden;
  position:relative;
}
 
.page-left{
  border-right:1px solid rgba(0,0,0,0.1);
  box-shadow:inset -12px 0 28px rgba(0,0,0,0.08);
}
 
.page-right{
  box-shadow:inset 12px 0 28px rgba(0,0,0,0.08);
}
 
/* Spine overlay */
.spine{
  position:absolute;
  left:50%;
  top:0;bottom:0;
  width:40px;
  transform:translateX(-50%);
  background:linear-gradient(to right,
    rgba(0,0,0,0.0) 0%,
    rgba(0,0,0,0.18) 45%,
    rgba(0,0,0,0.18) 55%,
    rgba(0,0,0,0.0) 100%);
  z-index:10;
  pointer-events:none;
}
 
/* ── PAGE TURN OVERLAY ──
   A half-page div that animates from scaleX(1)→scaleX(0) (forward)
   or scaleX(0)→scaleX(1) (backward), with a gradient to simulate curl */
.page-turner{
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:20;
  pointer-events:none;
  transform-origin:left center;
  display:none;
}
 
.page-turner.right-turn{
  left:50%;
  transform-origin:left center;
  background:#eaddca;
  background-image:url('https://www.transparenttextures.com/patterns/parchment.png');
}
 
.page-turner.left-turn{
  left:0%;
  transform-origin:right center;
  background:#eaddca;
  background-image:url('https://www.transparenttextures.com/patterns/parchment.png');
}
 
/* Curl shadow inside the turning page */
.page-turner::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to left,
    rgba(0,0,0,0.0) 30%,
    rgba(0,0,0,0.28) 80%,
    rgba(0,0,0,0.42) 100%);
  pointer-events:none;
}
 
.page-turner.left-turn::after{
  background:linear-gradient(to right,
    rgba(0,0,0,0.0) 30%,
    rgba(0,0,0,0.28) 80%,
    rgba(0,0,0,0.42) 100%);
}
 
/* Shadow that falls on the static page beneath */
.page-shadow{
  position:absolute;
  top:0;
  height:100%;
  width:40%;
  z-index:19;
  pointer-events:none;
  opacity:0;
  display:none;
}
 
.page-shadow.shadow-right{
  left:50%;
  background:linear-gradient(to right,rgba(0,0,0,0.22) 0%,rgba(0,0,0,0.0) 100%);
}
 
.page-shadow.shadow-left{
  right:50%;
  background:linear-gradient(to left,rgba(0,0,0,0.22) 0%,rgba(0,0,0,0.0) 100%);
}
 
/* ── TYPOGRAPHY ── */
h1,h2,h3,h4{font-family:'Great Vibes',cursive;color:#5d4037;margin-bottom:12px;}
h1.title-main{color:#2b1b12;font-size:3rem;line-height:1.1;}
 
p{font-size:1.08rem;line-height:1.65;margin-bottom:10px;color:#2b1e16;}
 
.subtitle{font-size:0.7rem;text-transform:uppercase;letter-spacing:2.5px;opacity:0.5;margin-bottom:10px;}
 
.handwritten{font-style:italic;font-size:1.12rem;line-height:1.7;color:#3d2b1f;}
.handwritten p{margin-bottom:9px;}
 
hr{border:none;border-top:1px solid rgba(0,0,0,0.12);margin:12px 0;}
 
.field-notes{
  background:rgba(255,255,255,0.2);
  border:1px solid rgba(0,0,0,0.07);
  border-radius:3px;
  padding:14px 16px;
  margin-top:10px;
  font-size:1.05rem;
  line-height:1.6;
}
 
.scrapbook-img{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border:5px solid #fff;
  box-shadow:2px 3px 10px rgba(0,0,0,0.25);
  margin-bottom:16px;
  display:block;
  filter:sepia(0.6) contrast(0.9);
}
 
.rotate-l{transform:rotate(-1.5deg);}
.rotate-r{transform:rotate(1.5deg);}
 
/* ── NAV ── */
.nav-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:auto;
  padding-top:16px;
}
 
.btn-flip{
  background:none;
  border:none;
  border-bottom:1px solid #c5a059;
  color:#2b1b12;
  font-family:'Crimson Text',serif;
  font-size:0.78rem;
  text-transform:uppercase;
  letter-spacing:2px;
  cursor:pointer;
  padding:0 0 3px;
  transition:color 0.2s;
}
.btn-flip:hover{color:#c5a059;}
.btn-flip:disabled{opacity:0.25;cursor:default;border-bottom-color:rgba(0,0,0,0.15);}
 
/* ── DOTS ── */
.dots{
  display:flex;
  gap:9px;
  justify-content:center;
  margin-top:20px;
}
.dot{
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(197,160,89,0.2);
  border:1px solid #c5a059;
  cursor:pointer;
  transition:background 0.25s,transform 0.2s;
}
.dot.on{background:#c5a059;transform:scale(1.25);}
 
/* Corner page-curl hint */
.corner{
  position:absolute;
  bottom:0;right:0;
  width:0;height:0;
  border-style:solid;
  border-width:0 0 48px 48px;
  border-color:transparent transparent rgba(197,160,89,0.5) transparent;
  cursor:pointer;
  z-index:30;
  transition:border-width 0.2s;
}
.corner:hover{border-width:0 0 62px 62px;border-color:transparent transparent rgba(197,160,89,0.8) transparent;}
 
.corner-left{
  position:absolute;
  bottom:0;left:0;
  width:0;height:0;
  border-style:solid;
  border-width:48px 48px 0 0;
  border-color:transparent rgba(197,160,89,0.5) transparent transparent;
  cursor:pointer;
  z-index:30;
  transition:border-width 0.2s;
}
.corner-left:hover{border-width:62px 62px 0 0;border-color:transparent rgba(197,160,89,0.8) transparent transparent;}
 
@media(max-width:600px){
  .book{flex-direction:column;aspect-ratio:auto;border-radius:6px;}
  .page{padding:28px 22px;}
  .spine{display:none;}
  .corner,.corner-left{display:none;}
}
</style>
</head>
<body>
<a href="index.html" style="display:block; margin-top:14px; text-align:center; font-family:'Crimson Text',serif; font-size:0.78rem; color:rgba(197,160,89,0.5); text-decoration:none; letter-spacing:1px;" onmouseover="this.style.color='#c5a059'" onmouseout="this.style.color='rgba(197,160,89,0.5)'">← back to index</a>
 
<div class="book-wrap">
  <div class="book" id="book">
    <div class="page page-left"  id="pageL"></div>
    <div class="page page-right" id="pageR"></div>
 
    <!-- The sweeping page-turn flap -->
    <div class="page-turner" id="turner"></div>
 
    <!-- Shadow cast on the underlying page -->
    <div class="page-shadow" id="pShadow"></div>
 
    <div class="spine"></div>
 
    <div class="corner"      id="cornerR"></div>
    <div
$0 class="corner-left" id="cornerL"></div>
  </div>
  <div class="dots" id="dots"></div>
</div>
 
<script>
(function(){
  var TOTAL = 5;
  var cur   = 0;
  var busy  = false;
  var DUR   = 480; // ms
 
  var pageL   = document.getElementById('pageL');
  var pageR   = document.getElementById('pageR');
  var turner  = document.getElementById('turner');
  var pShadow = document.getElementById('pShadow');
  var cornerR = document.getElementById('cornerR');
  var cornerL = document.getElementById('cornerL');
  var dotsEl  = document.getElementById('dots');
 
  // ── Spread data ──────────────────────────────────────────
  var spreads = [
    {
      left: `
        <img src="https://i.pinimg.com/736x/ee/09/c3/ee09c382c0b2a12409bec71c4310d431.jpg" class="scrapbook-img rotate-l" alt="">
        <h2>The First Fire</h2>
        <p>It began in Willow Creek, 1954. The dust bowl years were fading, but the resolve they forged remained. Nanna always said a house isn't built of bricks, but of the steam rising from a Sunday roast.</p>`,
      right: `
        <h1 class="title-main">Nanna's Story</h1>
        <p class="subtitle">Willow Creek, 1954 – Present</p>
        <hr>
        <div class="handwritten" style="margin-top:6px;">
          <p>"I remember the day your Grandfather brought home the heavy cast iron skillet. He said it was for 'emergencies,' but I used it for everything, and fried chicken to chocolate cake."</p>
          <p>"We didn't have much, but our table was always full. There's always room for one more chair."</p>
          <img src="https://i.pinimg.com/736x/a8/4e/af/a84eafeb0a00e24aefdb219dc107bce8.jpg" 
        
        class="scrapbook-img" style="filter:sepia(0.3) contrast(1.1);border:4px solid #2b1b12;padding:4px; background:#c5a059;max-height:240px;" alt="">
    
        </div>`
    },
    {
      left: `
        <h3>The Valley Fields</h3>
        <img src="https://i.pinimg.com/736x/46/fb/20/46fb20a505fcf5526700f5d60894d19e.jpg" class="scrapbook-img rotate-r" alt="">
        <p>The early mornings were for the farm. Your Grandfather would walk the rows long before sunrise, his boots heavy with the rich, black soil.</p>`,
      right: `
        <h2>The Barn's Reach</h2>
        <div class="handwritten">
          <p>"Your Grandfather used to say the real work happened in the kitchen. Our old barn was just storage, but the kitchen… that's where the magic was."</p>
          <p>"Everything we ate had a face and a name. Every potato dug by hand. You don't just eat food like that, and you honor it."</p>
          <img src="https://i.pinimg.com/736x/87/34/95/87349556e138002a8170381ada4608a1.jpg" class="scrapbook-img rotate-l" alt="">
        </div>`
    },
    {
      left: `
        <h2>The Structure</h2>
        <img src="https://i.pinimg.com/736x/0d/5d/f8/0d5df80d648842c83f84185564e98f6d.jpg" 
        
        class="scrapbook-img" style="filter:sepia(0.3) contrast(1.1);border:2px solid #2b1b12;padding:4px; background:#c5a059;max-height:370px;" alt="">
        <p>This early schematic shows the original expansion. Note the double flue, essential for the heavy baking Nanna was starting to do.</p>`,
      right: `
        <h4 style="font-size:1.9rem;">Field Notes</h4>
        <div class="field-notes handwritten">
          <p>Foundations laid May 1961. River stone for the hearth. Timber from the back woods lot. Nanna insists on the large window facing the sunrise.</p>
        </div>
        <div class="handwritten" style="margin-top:12px;">
          <p>"I drew this myself, sitting at the table. Every beam, every door, and I wanted it warm. A place to linger, not just pass through."</p>
          <p>"The blueprint wasn't just for a room; it was the outline for our entire future."</p>
          
        </div>`
    },
    {
      left: `
        <h3>The Early Years</h3>
        <img src="https://i.pinimg.com/736x/1c/48/e1/1c48e10a241a3bf875ba8dbe3f50c190.jpg" class="scrapbook-img rotate-l" alt="">
        <p>By 1965 the kitchen had expanded — three kids, two dogs, and a constant rotation of neighbors. This photo was taken the morning of the Harvest Festival.</p>`,
      right: `
        <h2>Noise &amp; Flour</h2>
        <div class="handwritten">
          <p>"The kids would sit on the counter, swinging their bare legs while I kneaded the dough. Thomas always tried to steal the raisins, and Mary was the official flour-sprinkler."</p>
          <p>"Those messy, noisy mornings were the heart of our life. It wasn't perfect, but it was ours."</p>
          <img src="https://i.pinimg.com/1200x/4a/60/a1/4a60a18c601f64fea140039e700d4b9e.jpg" 
        
        class="scrapbook-img" style="filter:sepia(0.3) contrast(1.1);border:4px solid #2b1b12;padding:4px; background:#c5a059;max-height:200px;" alt="">
        </div>`
    },
    {
      left: `
        <img src="https://i.pinimg.com/736x/21/33/51/2133510a9e9d161b9ac8b10288ec6071.jpg" class="scrapbook-img" alt="">
        <h3>The Golden Years</h3>
        <p>Eventually the flour dust settled, and the kids grew up. But the kitchen remained the center of the universe — every holiday, heartbreak, and victory came back here.</p>`,
      right: `
        <h2>Passing the Torch</h2>
        <div class="handwritten">
          <p>"Now my hands are a bit slower, and the oven takes longer to preheat. But when I see you standing where I once stood, holding that same wooden spoon… I know the story continues."</p>
        </div>
        <hr>
        <div class="field-notes">
          <strong>Nanna's final tip:</strong> Never trust a recipe that doesn't let you taste as you go. Measuring is important, but instinct is divine.
        </div>
        <div style="margin-top:14px;text-align:center;">
          <div style="font-family:'Great Vibes';font-size:2rem;color:#5d4037;">Love, Nanna</div>
        </div>`
    }
  ];
 
  // ── Dots ────────────────────────────────────────────────
  for(var i=0;i<TOTAL;i++){
    (function(idx){
      var d=document.createElement('div');
      d.className='dot'+(idx===0?' on':'');
      d.addEventListener('click',function(){ if(idx>cur)next();else if(idx<cur)prev(); });
      dotsEl.appendChild(d);
    })(i);
  }
 
  function updateDots(){
    var ds=dotsEl.querySelectorAll('.dot');
    ds.forEach(function(d,i){ d.classList.toggle('on',i===cur); });
  }
 
  // ── Render a spread with no animation ───────────────────
  function render(idx){
    pageL.innerHTML = spreads[idx].left  + navHTML(idx);
    pageR.innerHTML = spreads[idx].right + (idx===0?'':'');
    // Attach nav button listeners
    var btnN = pageL.querySelector('.btn-next')||pageR.querySelector('.btn-next');
    var btnP = pageL.querySelector('.btn-prev')||pageR.querySelector('.btn-prev');
    if(btnN) btnN.addEventListener('click', next);
    if(btnP) btnP.addEventListener('click', prev);
    cornerL.style.visibility = idx===0?'hidden':'visible';
    cornerR.style.visibility = idx===TOTAL-1?'hidden':'visible';
    updateDots();
  }
 
  function navHTML(idx){
    var html='<div class="nav-row">';
    if(idx>0)       html+='<button class="btn-flip btn-prev">← Previous</button>';
    else             html+='<span></span>';
    if(idx<TOTAL-1) html+='<button class="btn-flip btn-next">Next Chapter →</button>';
    else             html+='<span></span>';
    html+='</div>';
    return html;
  }
 
  // ── FLIP FORWARD ─────────────────────────────────────────
  function next(){
    if(busy||cur>=TOTAL-1) return;
    busy=true;
 
    // Show incoming right page behind everything
    pageR.innerHTML = spreads[cur+1].right;
 
    // Set up turner on right half, full width, showing current right content
    turner.className      = 'page-turner right-turn';
    turner.style.display  = 'block';
    turner.style.left     = '50%';
    turner.style.width    = '50%';
    turner.style.transformOrigin = 'left center';
    turner.style.transform       = 'scaleX(1)';
    turner.style.transition      = 'none';
 
    // Shadow on right page
    pShadow.className     = 'page-shadow shadow-right';
    pShadow.style.display = 'block';
    pShadow.style.opacity = '0';
    pShadow.style.transition = 'none';
 
    void turner.offsetWidth; // force reflow
 
    // Animate: squeeze turner from left→spine (scaleX 1→0)
    turner.style.transition  = 'transform '+DUR+'ms cubic-bezier(0.4,0,0.6,1)';
    turner.style.transform   = 'scaleX(0)';
 
    pShadow.style.transition = 'opacity '+(DUR*0.6)+'ms ease-out '+(DUR*0.2)+'ms';
    pShadow.style.opacity    = '0.6';
 
    setTimeout(function(){
      cur++;
      // Now render full new spread on static pages
      pageL.innerHTML = spreads[cur].left;
      pageR.innerHTML = spreads[cur].right + navHTML(cur);
      attachNav();
      turner.style.display  = 'none';
      pShadow.style.display = 'none';
      cornerL.style.visibility = cur===0?'hidden':'visible';
      cornerR.style.visibility = cur===TOTAL-1?'hidden':'visible';
      updateDots();
      busy=false;
    }, DUR+40);
  }
 
  // ── FLIP BACKWARD ────────────────────────────────────────
  function prev(){
    if(busy||cur<=0) return;
    busy=true;
 
    // Show incoming left page behind everything
    pageL.innerHTML = spreads[cur-1].left;
 
    // Turner on left half, starts at spine (scaleX=0) and expands left
    turner.className     = 'page-turner left-turn';
    turner.style.display = 'block';
    turner.style.left    = '0%';
    turner.style.width   = '50%';
    turner.style.transformOrigin = 'right center';
    turner.style.transform       = 'scaleX(0)';
    turner.style.transition      = 'none';
 
    pShadow.className     = 'page-shadow shadow-left';
    pShadow.style.display = 'block';
    pShadow.style.opacity = '0.5';
    pShadow.style.transition = 'none';
 
    void turner.offsetWidth;
 
    turner.style.transition  = 'transform '+DUR+'ms cubic-bezier(0.4,0,0.6,1)';
    turner.style.transform   = 'scaleX(1)';
 
    pShadow.style.transition = 'opacity '+(DUR*0.5)+'ms ease-in';
    pShadow.style.opacity    = '0';
 
    setTimeout(function(){
      cur--;
      pageL.innerHTML = spreads[cur].left;
      pageR.innerHTML = spreads[cur].right + navHTML(cur);
      attachNav();
      turner.style.display  = 'none';
      pShadow.style.display = 'none';
      cornerL.style.visibility = cur===0?'hidden':'visible';
      cornerR.style.visibility = cur===TOTAL-1?'hidden':'visible';
      updateDots();
      busy=false;
    }, DUR+40);
  }
 
  function attachNav(){
    var btnN = document.querySelector('.btn-next');
    var btnP = document.querySelector('.btn-prev');
    if(btnN) btnN.addEventListener('click', next);
    if(btnP) btnP.addEventListener('click', prev);
  }
 
  // Corners
  cornerR.addEventListener('click', next);
  cornerL.addEventListener('click', prev);
 
  // Keys
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='ArrowDown') next();
    if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   prev();
  });
 
  // Touch
  var tx=0;
  document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
  document.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>50){ dx<0?next():prev(); }
  },{passive:true});
 
  // Init
  pageL.innerHTML = spreads[0].left;
  pageR.innerHTML = spreads[0].right + navHTML(0);
  attachNav();
  cornerL.style.visibility='hidden';
})();
</script>
</body>
</html>

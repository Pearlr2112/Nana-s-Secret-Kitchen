<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanna's Story | The Stable Heirloom</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
 
body{
  background:#120a07;
  font-family:'Crimson Text',serif;  
  color:#2b1e16;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 16px;
}
 
/* ── BOOK WRAPPER ── */
.book-wrap{
  width:100%;
  max-width:980px;
  position:relative;
}
 
.book{
  width:100%;
  aspect-ratio:1.55/1;
  min-height:520px;
  display:flex;
  position:relative;
  border-radius:4px 12px 12px 4px;
  box-shadow:0 30px 80px rgba(0,0,0,0.95),0 8px 24px rgba(0,0,0,0.7);
  overflow:hidden;
}
 
.page{
  flex:1;
  background:#eaddca;
  background-image:url('https://www.transparenttextures.com/patterns/parchment.png');
  padding:38px 46px;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  overflow:hidden;
  position:relative;
}
 
.page-left{
  border-right:1px solid rgba(0,0,0,0.1);
  box-shadow:inset -12px 0 28px rgba(0,0,0,0.08);
}
 
.page-right{
  box-shadow:inset 12px 0 28px rgba(0,0,0,0.08);
}
 
.spine{
  position:absolute;
  left:50%;
  top:0;bottom:0;
  width:40px;
  transform:translateX(-50%);
  background:linear-gradient(to right,
    rgba(0,0,0,0.0) 0%,
    rgba(0,0,0,0.18) 45%,
    rgba(0,0,0,0.18) 55%,
    rgba(0,0,0,0.0) 100%);
  z-index:10;
  pointer-events:none;
}
 
.page-turner{
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  z-index:20;
  pointer-events:none;
  transform-origin:left center;
  display:none;
  background:#eaddca;
  background-image:url('https://www.transparenttextures.com/patterns/parchment.png');
  padding:38px 46px;
}
 
.page-turner.right-turn{
  left:50%;
  transform-origin:left center;
}
 
.page-turner.left-turn{
  left:0%;
  transform-origin:right center;
}
 
.page-turner::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(to left, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.28) 80%, rgba(0,0,0,0.42) 100%);
}
 
.page-shadow{
  position:absolute;
  top:0; height:100%; width:40%;
  z-index:19; pointer-events:none; opacity:0; display:none;
}
 
.page-shadow.shadow-right{
  left:50%;
  background:linear-gradient(to right,rgba(0,0,0,0.22) 0%,rgba(0,0,0,0.0) 100%);
}
 
/* ── TYPOGRAPHY ── */
h1,h2,h3,h4{font-family:'Great Vibes',cursive;color:#5d4037;margin-bottom:12px;}
h1.title-main{color:#2b1b12;font-size:3rem;line-height:1.1;}
p{font-size:1.08rem;line-height:1.65;margin-bottom:10px;color:#2b1e16;}
.subtitle{font-size:0.7rem;text-transform:uppercase;letter-spacing:2.5px;opacity:0.5;margin-bottom:10px;}
.handwritten{font-style:italic;font-size:1.12rem;line-height:1.7;color:#3d2b1f;}
hr{border:none;border-top:1px solid rgba(0,0,0,0.12);margin:12px 0;}
 
.scrapbook-img{
  width:100%;
  max-height:220px;
  object-fit:cover;
  border:5px solid #fff;
  box-shadow:2px 3px 10px rgba(0,0,0,0.25);
  margin-bottom:16px;
  display:block;
  filter:sepia(0.6) contrast(0.9);
  background-color: #d3c4b1; /* Fallback for "blank" image */
}
 
.nav-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:auto;
  padding-top:16px;
}
 
.btn-flip{
  background:none; border:none; border-bottom:1px solid #c5a059;
  color:#2b1b12; font-family:'Crimson Text',serif;
  font-size:0.78rem; text-transform:uppercase; letter-spacing:2px;
  cursor:pointer; padding:0 0 3px;
}
 
.dots{display:flex; gap:9px; justify-content:center; margin-top:20px;}
.dot{
  width:8px; height:8px; border-radius:50%;
  background:rgba(197,160,89,0.2); border:1px solid #c5a059;
  cursor:pointer;
}
.dot.on{background:#c5a059; transform:scale(1.25);}
 
.corner, .corner-left{
  position:absolute; bottom:0; width:0; height:0; border-style:solid;
  cursor:pointer; z-index:30; transition:border-width 0.2s;
}
.corner{right:0; border-width:0 0 48px 48px; border-color:transparent transparent rgba(197,160,89,0.5) transparent;}
.corner-left{left:0; border-width:48px 48px 0 0; border-color:transparent rgba(197,160,89,0.5) transparent transparent;}
 
@media(max-width:600px){
  .book{flex-direction:column; aspect-ratio:auto;}
  .spine, .corner, .corner-left{display:none;}
}
</style>
</head>
<body>
 
<div class="book-wrap">
  <div class="book" id="book">
    <div class="page page-left"  id="pageL"></div>
    <div class="page page-right" id="pageR"></div>
    <div class="page-turner" id="turner"></div>
    <div class="page-shadow" id="pShadow"></div>
    <div class="spine"></div>
    <div class="corner"      id="cornerR"></div>
    <div class="corner-left" id="cornerL"></div>
  </div>
  <div class="dots" id="dots"></div>
</div>
 
<script>
(function(){
  var TOTAL = 4;
  var cur   = 0;
  var busy  = false;
  var DUR   = 480; 
 
  var pageL   = document.getElementById('pageL');
  var pageR   = document.getElementById('pageR');
  var turner  = document.getElementById('turner');
  var pShadow = document.getElementById('pShadow');
  var dotsEl  = document.getElementById('dots');
  var cornerR = document.getElementById('cornerR');
  var cornerL = document.getElementById('cornerL');
 
  // --- Updated with your Recipe Names and Blank Image logic ---
  var spreads = [
    {
      left: `<img src="https://images.unsplash.com/photo-1596191717281-b6a8276f5707?q=80&w=800" class="scrapbook-img" alt="">
             <h2>Sunday Roast Chicken</h2>
             <p>The secret was always the double-basting. Nanna swore by salted butter and a house full of steam.</p>`,
      right: `<h1 class="title-main">Nanna's Kitchen</h1><p class="subtitle">Recipe No. 1</p><hr>
              <div class="handwritten"><p>"I remember the day your Grandfather brought home the cast iron skillet. It's been the heart of our Sundays ever since."</p></div>`
    },
    {
      left: `<img src="https://images.unsplash.com/photo-1507208773393-40d9fc670acf?q=80&w=800" class="scrapbook-img" alt="">
             <h2>Old Fashioned Apple Pie</h2>
             <p>Tart Granny Smith apples and a crust that had to chill for two hours. Patience is the secret ingredient.</p>`,
      right: `<h2>A Sweet Tradition</h2><div class="handwritten"><p>"The kids would sit on the counter, swinging their bare legs while I rolled out the dough."</p></div>`
    },
    {
      left: `<img src="" class="scrapbook-img" alt="[Blank Photo Placeholder]">
             <h2>Cast Iron Cornbread</h2>
             <p>A hot skillet makes the perfect crust. Melt the bacon fat until it sizzles before you pour the batter.</p>`,
      right: `<h2>The Golden Rule</h2><div class="handwritten"><p>"Never trust a recipe that doesn't let you taste as you go. Instinct is divine."</p></div>`
    },
    {
      left: `<img src="https://images.unsplash.com/photo-1560942065-9833446be082?q=80&w=800" class="scrapbook-img" alt="">
             <h2>Hand-Dug Mashed Potatoes</h2>
             <p>Every potato dug by hand from the valley fields. Yukon Golds, heavy cream, and more butter than you think.</p>`,
      right: `<h2>Passing the Torch</h2><div class="handwritten"><p>"When I see you holding that same wooden spoon, I know the story continues."</p></div>
              <div style="text-align:center; margin-top:20px;"><div style="font-family:'Great Vibes'; font-size:2rem;">Love, Nanna</div></div>`
    }
  ];
 
  function init(){
    for(var i=0; i<TOTAL; i++){
      let d = document.createElement('div');
      d.className = 'dot' + (i===0?' on':'');
      d.onclick = (function(idx){ return function(){ if(!busy && idx !== cur) idx > cur ? next() : prev(); }})(i);
      dotsEl.appendChild(d);
    }
    render(0);
  }
 
  function render(idx){
    pageL.innerHTML = spreads[idx].left;
    pageR.innerHTML = spreads[idx].right + navHTML(idx);
    attachNav();
    updateUI(idx);
  }
 
  function navHTML(idx){
    var html='<div class="nav-row">';
    html += (idx > 0) ? '<button class="btn-flip btn-prev">← Previous</button>' : '<span></span>';
    html += (idx < TOTAL - 1) ? '<button class="btn-flip btn-next">Next Recipe →</button>' : '<span></span>';
    html += '</div>';
    return html;
  }
 
  function attachNav(){
    let n = document.querySelector('.btn-next'), p = document.querySelector('.btn-prev');
    if(n) n.onclick = next;
    if(p) p.onclick = prev;
  }
 
  function updateUI(idx){
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === idx));
    cornerL.style.visibility = idx === 0 ? 'hidden' : 'visible';
    cornerR.style.visibility = idx === TOTAL-1 ? 'hidden' : 'visible';
  }
 
  function next(){
    if(busy || cur >= TOTAL-1) return;
    busy = true;
    turner.innerHTML = pageR.innerHTML;
    turner.className = 'page-turner right-turn';
    turner.style.display = 'block';
    turner.style.transform = 'scaleX(1)';
 
    pageL.innerHTML = spreads[cur+1].left;
    pageR.innerHTML = spreads[cur+1].right + navHTML(cur+1);
 
    void turner.offsetWidth;
    turner.style.transition = `transform ${DUR}ms ease-in-out`;
    turner.style.transform = 'scaleX(0)';
 
    setTimeout(() => {
      cur++;
      turner.style.display = 'none';
      turner.style.transition = 'none';
      attachNav();
      updateUI(cur);
      busy = false;
    }, DUR);
  }
 
  function prev(){
    if(busy || cur <= 0) return;
    busy = true;
    turner.innerHTML = spreads[cur-1].left;
    turner.className = 'page-turner left-turn';
    turner.style.display = 'block';
    turner.style.transform = 'scaleX(0)';
 
    pageR.innerHTML = spreads[cur-1].right + navHTML(cur-1);
 
    void turner.offsetWidth;
    turner.style.transition = `transform ${DUR}ms ease-in-out`;
    turner.style.transform = 'scaleX(1)';
 
    setTimeout(() => {
      cur--;
      pageL.innerHTML = spreads[cur].left;
      turner.style.display = 'none';
      turner.style.transition = 'none';
      attachNav();
      updateUI(cur);
      busy = false;
    }, DUR);
  }
 
  cornerR.onclick = next;
  cornerL.onclick = prev;
  init();
})();
</script>
</body>
</html>
